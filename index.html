<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>VAR HC Management Viewer</title>

  <style>
    body { font-family: Arial, sans-serif; padding: 16px; font-size: 14px; }
    h3 { margin-top: 0; }
    .toolbar { display: flex; gap: 8px; flex-wrap: wrap; margin: 12px 0; align-items: center; }
    input, select, button { padding: 6px; border: 1px solid #ccc; border-radius: 4px; background: white; }
    button { cursor: pointer; }
    .status { margin: 8px 0; color: #666; }
    .count { margin-top: 8px; font-weight: bold; }
    .table-wrap { max-height: 650px; overflow: auto; border: 1px solid #ddd; margin-top: 8px; }
    table { border-collapse: collapse; width: 100%; min-width: 1200px; }
    th, td { border: 1px solid #ddd; padding: 6px; text-align: left; white-space: nowrap; }
    th { background: #f2f2f2; position: sticky; top: 0; z-index: 1; }
    tr:nth-child(even) { background: #fafafa; }
  </style>
</head>

<body>
  <h3>VAR HC Management</h3>

  <div class="toolbar">
    <label>직무</label>
    <select id="sheetFilter">
      <option value="All">All</option>
      <option value="SR">SR</option>
      <option value="AE">AE</option>
      <option value="MKTG">MKTG</option>
      <option value="ADMIN">ADMIN</option>
      <option value="ETC">ETC</option>
      <option value="Ex">Ex</option>
    </select>

    <select id="varFilter">
      <option value="">All VAR</option>
    </select>

    <input type="text" id="nameFilter" placeholder="Search Name" />

    <select id="paeFilter">
      <option value="">All PAE</option>
      <option value="O">PAE: O</option>
      <option value="X">PAE: X</option>
    </select>

    <select id="certFilter">
      <option value="">All Certification</option>
      <option value="O">Certification: O</option>
      <option value="X">Certification: X</option>
    </select>

    <button onclick="loadData()">Refresh</button>
  </div>

  <div class="status" id="statusArea">Loading data...</div>
  <div class="count" id="countArea"></div>

  <div class="table-wrap">
    <div id="tableArea"></div>
  </div>

  <script>
    let jsonData = {};
    let currentSheetData = [];
    let originalData = [];
    let headers = [];

    document.addEventListener("DOMContentLoaded", loadData);

    document.getElementById("sheetFilter").addEventListener("change", function () {
      loadSheet(this.value);
    });

    document.getElementById("varFilter").addEventListener("change", applyFilters);
    document.getElementById("nameFilter").addEventListener("input", applyFilters);
    document.getElementById("paeFilter").addEventListener("change", applyFilters);
    document.getElementById("certFilter").addEventListener("change", applyFilters);

    function loadData() {
      document.getElementById("statusArea").textContent = "Loading data...";

      fetch("data.json?ts=" + new Date().getTime())
        .then(response => {
          if (!response.ok) {
            throw new Error("Failed to load data.json");
          }
          return response.json();
        })
        .then(data => {
          jsonData = data || {};
          const selectedSheet = document.getElementById("sheetFilter").value || "All";
          loadSheet(selectedSheet);

          document.getElementById("statusArea").textContent =
            "Loaded successfully: " + new Date().toLocaleString();
        })
        .catch(error => {
          document.getElementById("statusArea").textContent = "Error: " + error.message;
          document.getElementById("tableArea").innerHTML = "";
          document.getElementById("countArea").textContent = "";
        });
    }

    function loadSheet(sheetName) {
      currentSheetData = jsonData[sheetName] || [];

      if (!Array.isArray(currentSheetData) || currentSheetData.length === 0) {
        headers = [];
        originalData = [];
        buildVarFilter();
        renderTable([]);
        document.getElementById("statusArea").textContent = "No data found in sheet: " + sheetName;
        return;
      }

      headers = Object.keys(currentSheetData[0]);
      originalData = currentSheetData.map(row => headers.map(h => row[h] ?? ""));

      buildVarFilter();
      applyFilters();
    }

    function getColumnIndex(possibleNames) {
      return headers.findIndex(h =>
        possibleNames.some(name =>
          String(h).toLowerCase().trim() === name.toLowerCase()
        )
      );
    }

    function buildVarFilter() {
      const varIndex = getColumnIndex(["VAR", "Reseller", "Company", "회사"]);
      const select = document.getElementById("varFilter");

      select.innerHTML = '<option value="">All VAR</option>';

      if (varIndex === -1) return;

      const values = [...new Set(
        originalData
          .map(row => row[varIndex])
          .filter(v => String(v).trim() !== "")
      )];

      values.sort().forEach(value => {
        const option = document.createElement("option");
        option.value = value;
        option.textContent = value;
        select.appendChild(option);
      });
    }

    function applyFilters() {
      const varValue = document.getElementById("varFilter").value;
      const nameValue = document.getElementById("nameFilter").value.toLowerCase();
      const paeValue = document.getElementById("paeFilter").value;
      const certValue = document.getElementById("certFilter").value;

      const varIndex = getColumnIndex(["VAR", "Reseller", "Company", "회사"]);
      const nameIndex = getColumnIndex(["NAME", "Name", "이름"]);
      const paeIndex = getColumnIndex(["PAE", "pae_assign", "PAE 지정 여부", "PAE 지정여부"]);
      const certIndex = getColumnIndex(["Certification", "certi_exist", "Certification 여부", "인증", "이전 Certi 정보"]);

      const filtered = originalData.filter(row => {
        const matchVar =
          varIndex === -1 || !varValue || String(row[varIndex]) === varValue;

        const matchName =
          nameIndex === -1 || !nameValue || String(row[nameIndex]).toLowerCase().includes(nameValue);

        const matchPae =
          paeIndex === -1 || !paeValue || String(row[paeIndex]).toUpperCase() === paeValue;

        const matchCert =
          certIndex === -1 || !certValue || String(row[certIndex]).toUpperCase() === certValue;

        return matchVar && matchName && matchPae && matchCert;
      });

      renderTable(filtered);
    }

    function renderTable(data) {
      if (!headers || headers.length === 0) {
        document.getElementById("countArea").textContent = "Total: 0";
        document.getElementById("tableArea").innerHTML = "";
        return;
      }

      let html = "<table><thead><tr>";

      headers.forEach(header => {
        let displayHeader = header;

        if (header === "Job") {
          displayHeader = "직무";
        }

        html += `<th>${escapeHtml(displayHeader)}</th>`;
      });

      html += "</tr></thead><tbody>";

      data.forEach(row => {
        html += "<tr>";
        headers.forEach((_, index) => {
          html += `<td>${escapeHtml(row[index] ?? "")}</td>`;
        });
        html += "</tr>";
      });

      html += "</tbody></table>";

      document.getElementById("countArea").textContent = `Total: ${data.length}`;
      document.getElementById("tableArea").innerHTML = html;
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }
  </script>
</body>
</html>
